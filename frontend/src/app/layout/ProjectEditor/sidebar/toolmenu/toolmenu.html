<div class="toolmenu">
    @switch (selectedTool) {
        @case ('Presets') {
            <div class="toolmenu-section">
                <h3>Presets</h3>
                <button class="toolmenu-button" (click)="onOptionClick('Basic Sweater')">Basic Sweater</button>
                <button class="toolmenu-button" (click)="onOptionClick('Hat')">Hat</button>
                <button class="toolmenu-button" (click)="onOptionClick('Scarf')">Scarf</button>
                <button class="toolmenu-button" (click)="onOptionClick('Blanket')">Blanket</button>
            </div>
        }
        @case ('2D shapes') {
            <app-shapemenu></app-shapemenu>
        }
        @case ('3D shapes') {
            <div class="toolmenu-section">
                <h3>3D Shapes</h3>
                <button class="toolmenu-button" (click)="onOptionClick('Sphere')">Sphere</button>
                <button class="toolmenu-button" (click)="onOptionClick('Cube')">Cube</button>
                <button class="toolmenu-button" (click)="onOptionClick('Cylinder')">Cylinder</button>
                <button class="toolmenu-button" (click)="onOptionClick('Cone')">Cone</button>
            </div>
        }
        @case ('Yarns') {
            <app-yarnmenu></app-yarnmenu>
        }
        @case ('Stitch Chart') {
            <div class="toolmenu-section">
                <h3>Stitch Types</h3>
            </div>
        }
    }
</div>
