<div class="dropdown">
  @for (dropdown of dropdownMenus; track dropdown[0]) {
    <button class="dropdown-button"
            (click)="toggle(dropdown[0])"
            (blur)="toggle(dropdown[0])">
      {{dropdown[0]}} ▾
    </button>
    @if (isOpen == dropdown[0]) {
      <div class="dropdown-menu">
        @for (value of dropdown[1]; track value.value) {
          @if (value.label == "divider") {
            <menu class="divider"></menu>
          } @else {
            <div class="dropdown-item" (click)="selectItem(value)">
              {{ (value.label) }}
            </div>
          }
        }
      </div>
    }
  }
</div>
